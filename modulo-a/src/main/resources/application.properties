spring.application.name=modulo-a

# Banco H2 em memória para desenvolvimento
spring.datasource.url=jdbc:h2:mem:pedidosdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 acessível em localhost:8080/h2-console
spring.h2.console.enabled=true

# Hibernate cria as tabelas automaticamente pelas entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true